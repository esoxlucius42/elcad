<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <rect width="48" height="48" rx="6" fill="#2e2e2e"/>
  <!-- 2D profile (white outline) at bottom -->
  <rect x="8" y="34" width="24" height="9" rx="1" fill="none" stroke="#e0e0e0" stroke-width="2"/>
  <!-- Dashed extrusion lines -->
  <line x1="8"  y1="33" x2="8"  y2="22" stroke="#777" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="32" y1="33" x2="32" y2="22" stroke="#777" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Extruded solid top face (blue) -->
  <rect x="8" y="12" width="24" height="10" rx="1" fill="#4a9eff"/>
  <!-- Direction arrow (right side) -->
  <line x1="40" y1="37" x2="40" y2="17" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="40,10 36,18 44,18" fill="#4a9eff"/>
</svg>
